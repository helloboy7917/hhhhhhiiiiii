<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나상효</title>
    <style>
        header{background: white;}
        section{background: skyblue;}
        footer{background: yellow;}
    </style>
</head>
<body>
    <header><h2>명함신청 페이지</h2></header>
    <section>
        <form>
<label>
    <p>
   1. 학년:<select name="grade">
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
        </select>
        </p>
</label>

<label>
    <p>
    2. 반:<select name="class">
        <option value="1">1반</option>
        <option value="2">2반</option>
        <option value="3">3반</option>
        <option value="4">4반</option>
        </select>
        </p>
</label>
<label>
    <p>
3. 번호:
<input type="text" name="number">
</p>
</label>

<label>
    <p>
4. 이름:
<input type="text" name="name">
</p>
</label>
<p><label>5. 원하는 시안 번호 선택</label></p>
<p><img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ" width="600"></p>
    <p>
    1안<input type="radio" name="name" value="1">
    2안<input type="radio" name="name" value="2">
    3안<input type="radio" name="name" value="3">
    <br>
    4안<input type="radio" name="name" value="4">
    5안<input type="radio" name="name" value="5">
    6안<input type="radio" name="name" value="6">
    </p>
    <p>
    6.내가 명함에 넣고 싶은 항목 선택
    </p>
    <p>
    이름<input type="checkbox" value="1">
    이메일<input type="checkbox" value="2">
    <br>
    디스코드 아이디<input type="checkbox" value="3">
    깃헙 아이디<input type="checkbox" value="3">
    <br>
    관심분야<input type="checkbox" value="3">
    휴대폰 번호<input type="checkbox" value="3">
    </p>
    <p>
    7.기타 건의사항
    </p>
    <p>
    <textarea cols="20" rows="10"></textarea>
    </p>
    <input type="submit" value="전송하기">
    <button type="reset">초기화하기</button>
    </form>
    </section>
    <footer>
    <h3>QnA</h3>
    <details>
    <summary>언제까지 내요?</summary>
    <p>3월 11일까지 제출합니다</p>
    </details>
    <details>
    <summary>명함 얼마에요?</summary>
    <p>무료입니다</p>
    </details>
    <details>
    <summary>늦게 내면 어떻게돼요?</summary>
    <p>1학년 <u><strong>전원</strong></u>의 명함 발급이 늦어집니다</p>
    </details>
    </footer>
</body>
</html>
